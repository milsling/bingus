<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Orphan Bars is the social platform for lyricists to share bars, one-liners, punchlines, and entendres. Join the community and build your catalog." />
    <meta name="keywords" content="rap, lyrics, bars, punchlines, hip hop, lyricist, wordplay, entendres, freestyle, rhymes" />

    <meta property="og:title" content="Orphan Bars" />
    <meta property="og:description" content="The place for lyricists to drop bars, one-liners, and entendres." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://orphanbars.space" />
    <meta property="og:image" content="https://orphanbars.space/opengraph.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@orphanbars" />
    <meta name="twitter:title" content="Orphan Bars" />
    <meta name="twitter:description" content="The place for lyricists to drop bars, one-liners, and entendres." />
    <meta name="twitter:image" content="https://orphanbars.space/opengraph.png" />

    <title>Orphan Bars</title>
    <script>
      // Apply saved theme immediately to prevent flash of wrong theme
      (function() {
        var t = localStorage.getItem('theme') || 'light';
        if (t === 'system') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(t);
        // Set root background to match theme immediately
        var r = document.getElementById('root');
        if (r) {
          if (t === 'dark') {
            r.style.background = 'hsl(240 16% 8%)';
            r.style.color = 'hsl(240 5% 84%)';
          } else {
            r.style.background = 'hsl(220 20% 98% / 0.05)';
            r.style.color = 'hsl(240 10% 10%)';
          }
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Orphan Bars" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#18181b" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Added UnifrakturMaguntia (Old English), Anton (Bold), and Oswald (Condensed) -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Black+Ops+One&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Mr+Dafoe&family=Oswald:wght@200..700&family=Honk&family=Syne:wght@400..800&family=UnifrakturMaguntia&family=Inter:wght@100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root" style="min-height:100dvh;display:flex;align-items:center;justify-content:center;background:hsl(220 20% 98% / 0.05);color:hsl(240 10% 10%);font-family:system-ui,sans-serif;">
      <div style="text-align:center;padding:2rem;">
        <p style="margin:0;font-size:1rem;">Loading Orphan Bars…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
